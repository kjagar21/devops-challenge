<svg width="900" height="520" viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" style="background:#0f1117;font-family:'Segoe UI',system-ui,sans-serif">

  <!-- Part 1 label -->
  <text x="40" y="36" fill="#9ca3af" font-size="13" font-weight="400">Part 1 — VM &amp; Docker</text>

  <!-- Row 1 boxes -->
  <rect x="40" y="48" width="180" height="58" rx="8" fill="#0d5c3e" stroke="#1a8a5a" stroke-width="1"/>
  <text x="130" y="73" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">1. Azure account</text>
  <text x="130" y="92" fill="#6ee7b7" font-size="11" text-anchor="middle">GitHub Student Pack</text>

  <rect x="260" y="48" width="180" height="58" rx="8" fill="#0d5c3e" stroke="#1a8a5a" stroke-width="1"/>
  <text x="350" y="73" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">2. Linux VM</text>
  <text x="350" y="92" fill="#6ee7b7" font-size="11" text-anchor="middle">Azure Virtual Machine</text>

  <rect x="480" y="48" width="180" height="58" rx="8" fill="#0d5c3e" stroke="#1a8a5a" stroke-width="1"/>
  <text x="570" y="73" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">3. SSH Security</text>
  <text x="570" y="92" fill="#6ee7b7" font-size="11" text-anchor="middle">Key auth, devops user</text>

  <!-- Arrows row 1 -->
  <line x1="220" y1="77" x2="258" y2="77" stroke="#6ee7b7" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="440" y1="77" x2="478" y2="77" stroke="#6ee7b7" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Down arrow -->
  <line x1="570" y1="106" x2="570" y2="126" stroke="#6ee7b7" stroke-width="1.5"/>
  <line x1="570" y1="126" x2="130" y2="126" stroke="#6ee7b7" stroke-width="1.5"/>
  <line x1="130" y1="126" x2="130" y2="148" stroke="#6ee7b7" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Row 2 boxes -->
  <rect x="40" y="150" width="180" height="58" rx="8" fill="#0d5c3e" stroke="#1a8a5a" stroke-width="1"/>
  <text x="130" y="175" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">4. Docker install</text>
  <text x="130" y="194" fill="#6ee7b7" font-size="11" text-anchor="middle">Separate disk for data</text>

  <rect x="260" y="150" width="180" height="58" rx="8" fill="#0d5c3e" stroke="#1a8a5a" stroke-width="1"/>
  <text x="350" y="175" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">5. Dockerfile</text>
  <text x="350" y="194" fill="#6ee7b7" font-size="11" text-anchor="middle">Custom nginx image</text>

  <rect x="480" y="150" width="180" height="58" rx="8" fill="#0d5c3e" stroke="#1a8a5a" stroke-width="1"/>
  <text x="570" y="175" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">6. Docker Hub push</text>
  <text x="570" y="194" fill="#6ee7b7" font-size="11" text-anchor="middle">Tag and publish image</text>

  <!-- Arrows row 2 -->
  <line x1="220" y1="179" x2="258" y2="179" stroke="#6ee7b7" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="440" y1="179" x2="478" y2="179" stroke="#6ee7b7" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Down arrow to step 7 -->
  <line x1="570" y1="208" x2="570" y2="228" stroke="#6ee7b7" stroke-width="1.5"/>
  <line x1="570" y1="228" x2="350" y2="228" stroke="#6ee7b7" stroke-width="1.5"/>
  <line x1="350" y1="228" x2="350" y2="248" stroke="#6ee7b7" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 7 centered -->
  <rect x="260" y="250" width="180" height="58" rx="8" fill="#0d5c3e" stroke="#1a8a5a" stroke-width="1"/>
  <text x="350" y="275" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">7. Run on VM</text>
  <text x="350" y="294" fill="#6ee7b7" font-size="11" text-anchor="middle">Publicly reachable HTTP</text>

  <!-- Divider -->
  <line x1="40" y1="332" x2="700" y2="332" stroke="#374151" stroke-width="1" stroke-dasharray="5 4"/>
  <text x="40" y="352" fill="#9ca3af" font-size="13" font-weight="400">Part 2 — Kubernetes</text>

  <!-- Row 3 boxes -->
  <rect x="40" y="360" width="180" height="58" rx="8" fill="#2d2b7a" stroke="#5b58d4" stroke-width="1"/>
  <text x="130" y="385" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">8. AKS cluster</text>
  <text x="130" y="404" fill="#a5b4fc" font-size="11" text-anchor="middle">Azure Kubernetes</text>

  <rect x="260" y="360" width="180" height="58" rx="8" fill="#2d2b7a" stroke="#5b58d4" stroke-width="1"/>
  <text x="350" y="385" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">9. Deploy image</text>
  <text x="350" y="404" fill="#a5b4fc" font-size="11" text-anchor="middle">nginx in Kubernetes</text>

  <rect x="480" y="360" width="180" height="58" rx="8" fill="#2d2b7a" stroke="#5b58d4" stroke-width="1"/>
  <text x="570" y="385" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">10. Traefik ingress</text>
  <text x="570" y="404" fill="#a5b4fc" font-size="11" text-anchor="middle">Public HTTP exposure</text>

  <line x1="220" y1="389" x2="258" y2="389" stroke="#a5b4fc" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="440" y1="389" x2="478" y2="389" stroke="#a5b4fc" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Bonus -->
  <line x1="40" y1="442" x2="700" y2="442" stroke="#374151" stroke-width="1" stroke-dasharray="5 4"/>
  <text x="40" y="462" fill="#9ca3af" font-size="13">Bonus — Infrastructure as Code</text>

  <rect x="40" y="470" width="180" height="38" rx="8" fill="#6b3a08" stroke="#d97706" stroke-width="1"/>
  <text x="130" y="487" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">Terraform VM</text>
  <text x="130" y="502" fill="#fcd34d" font-size="10" text-anchor="middle">main, variables, outputs</text>

  <rect x="260" y="470" width="180" height="38" rx="8" fill="#6b3a08" stroke="#d97706" stroke-width="1"/>
  <text x="350" y="487" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">Terraform AKS</text>
  <text x="350" y="502" fill="#fcd34d" font-size="10" text-anchor="middle">main, variables, outputs</text>

  <rect x="480" y="470" width="180" height="38" rx="8" fill="#1f2937" stroke="#4b5563" stroke-width="1"/>
  <text x="570" y="487" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">README.md</text>
  <text x="570" y="502" fill="#9ca3af" font-size="10" text-anchor="middle">GitHub submit</text>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#6ee7b7" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#a5b4fc" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>
</svg>

<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg" style="background:#0f1117;font-family:'Segoe UI',system-ui,sans-serif">

  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <!-- Step 1 -->
  <rect x="20" y="100" width="120" height="60" rx="8" fill="#374151" stroke="#4b5563" stroke-width="1"/>
  <text x="80" y="125" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">1.</text>
  <text x="80" y="145" fill="#9ca3af" font-size="12" text-anchor="middle">User</text>

  <!-- Step 2 -->
  <rect x="168" y="100" width="120" height="60" rx="8" fill="#374151" stroke="#4b5563" stroke-width="1"/>
  <text x="228" y="125" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">2.</text>
  <text x="228" y="145" fill="#9ca3af" font-size="12" text-anchor="middle">DNS</text>

  <!-- Step 3 -->
  <rect x="316" y="100" width="130" height="60" rx="8" fill="#6b3a08" stroke="#d97706" stroke-width="1"/>
  <text x="381" y="125" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">3.</text>
  <text x="381" y="145" fill="#fcd34d" font-size="12" text-anchor="middle">Load Balancer</text>

  <!-- Step 4 -->
  <rect x="474" y="100" width="120" height="60" rx="8" fill="#0d5c3e" stroke="#10b981" stroke-width="1"/>
  <text x="534" y="125" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">4.</text>
  <text x="534" y="145" fill="#6ee7b7" font-size="12" text-anchor="middle">Traefik</text>

  <!-- Step 5 -->
  <rect x="622" y="100" width="120" height="60" rx="8" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1"/>
  <text x="682" y="125" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">5.</text>
  <text x="682" y="145" fill="#93c5fd" font-size="12" text-anchor="middle">Service</text>

  <!-- Step 6 -->
  <rect x="770" y="100" width="110" height="60" rx="8" fill="#2d2b7a" stroke="#5b58d4" stroke-width="1"/>
  <text x="825" y="125" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">6.</text>
  <text x="825" y="145" fill="#a5b4fc" font-size="12" text-anchor="middle">Pod</text>

  <!-- Arrows -->
  <line x1="140" y1="130" x2="166" y2="130" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="288" y1="130" x2="314" y2="130" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="446" y1="130" x2="472" y2="130" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="594" y1="130" x2="620" y2="130" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="742" y1="130" x2="768" y2="130" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Labels below -->
  <text x="80" y="184" fill="#6b7280" font-size="11" text-anchor="middle">opens</text>
  <text x="80" y="198" fill="#6b7280" font-size="11" text-anchor="middle">9.223.252.236</text>

  <text x="228" y="184" fill="#6b7280" font-size="11" text-anchor="middle">resolves</text>
  <text x="228" y="198" fill="#6b7280" font-size="11" text-anchor="middle">to IP address</text>

  <text x="381" y="184" fill="#6b7280" font-size="11" text-anchor="middle">Azure LB</text>
  <text x="381" y="198" fill="#6b7280" font-size="11" text-anchor="middle">receives packet</text>

  <text x="534" y="184" fill="#6b7280" font-size="11" text-anchor="middle">reads path</text>
  <text x="534" y="198" fill="#6b7280" font-size="11" text-anchor="middle">and routes</text>

  <text x="682" y="184" fill="#6b7280" font-size="11" text-anchor="middle">K8s service</text>
  <text x="682" y="198" fill="#6b7280" font-size="11" text-anchor="middle">finds Pod</text>

  <text x="825" y="184" fill="#6b7280" font-size="11" text-anchor="middle">container</text>
  <text x="825" y="198" fill="#6b7280" font-size="11" text-anchor="middle">responds</text>
</svg>

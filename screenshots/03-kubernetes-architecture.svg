<svg width="900" height="560" viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" style="background:#0f1117;font-family:'Segoe UI',system-ui,sans-serif">

  <!-- Internet -->
  <rect x="360" y="20" width="180" height="44" rx="8" fill="#374151" stroke="#4b5563" stroke-width="1"/>
  <text x="450" y="47" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Internet / user</text>

  <line x1="450" y1="64" x2="450" y2="94" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Cluster border -->
  <rect x="30" y="96" width="840" height="440" rx="16" fill="none" stroke="#374151" stroke-width="1.5" stroke-dasharray="8 5"/>
  <text x="54" y="120" fill="#6b7280" font-size="12">Kubernetes Cluster (AKS)</text>

  <!-- Control Plane -->
  <rect x="50" y="128" width="230" height="148" rx="10" fill="#2d2b7a" stroke="#5b58d4" stroke-width="1"/>
  <text x="165" y="154" fill="#fff" font-size="15" font-weight="700" text-anchor="middle">Control Plane</text>

  <rect x="68" y="164" width="194" height="36" rx="6" fill="#1f1f5a" stroke="#4b48aa" stroke-width="1"/>
  <text x="165" y="187" fill="#c7d2fe" font-size="12" text-anchor="middle">API Server</text>

  <rect x="68" y="208" width="90" height="36" rx="6" fill="#1f1f5a" stroke="#4b48aa" stroke-width="1"/>
  <text x="113" y="231" fill="#c7d2fe" font-size="12" text-anchor="middle">Scheduler</text>

  <rect x="172" y="208" width="90" height="36" rx="6" fill="#1f1f5a" stroke="#4b48aa" stroke-width="1"/>
  <text x="217" y="231" fill="#c7d2fe" font-size="12" text-anchor="middle">etcd</text>

  <!-- Ingress Controller -->
  <rect x="330" y="128" width="210" height="72" rx="10" fill="#0d5c3e" stroke="#10b981" stroke-width="1"/>
  <text x="435" y="156" fill="#fff" font-size="15" font-weight="700" text-anchor="middle">Ingress Controller</text>
  <text x="435" y="178" fill="#6ee7b7" font-size="12" text-anchor="middle">Traefik</text>

  <!-- Arrow from internet to ingress -->
  <line x1="450" y1="96" x2="435" y2="126" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Arrow from control plane down -->
  <line x1="165" y1="276" x2="165" y2="318" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Text label -->
  <text x="590" y="182" fill="#6b7280" font-size="11">routes traffic</text>
  <text x="590" y="196" fill="#6b7280" font-size="11">to nodes</text>

  <!-- Node 1 -->
  <rect x="50" y="320" width="240" height="196" rx="10" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1"/>
  <text x="170" y="346" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Node 1 (VM)</text>

  <rect x="66" y="358" width="96" height="68" rx="6" fill="#374151" stroke="#4b5563" stroke-width="1"/>
  <text x="114" y="385" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">Pod</text>
  <text x="114" y="406" fill="#9ca3af" font-size="11" text-anchor="middle">nginx</text>

  <rect x="178" y="358" width="96" height="68" rx="6" fill="#374151" stroke="#4b5563" stroke-width="1"/>
  <text x="226" y="385" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">Pod</text>
  <text x="226" y="406" fill="#9ca3af" font-size="11" text-anchor="middle">nginx</text>

  <rect x="66" y="438" width="208" height="36" rx="6" fill="#374151" stroke="#4b5563" stroke-width="1"/>
  <text x="170" y="461" fill="#9ca3af" font-size="12" text-anchor="middle">kubelet</text>

  <!-- Node 2 -->
  <rect x="330" y="320" width="240" height="196" rx="10" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1"/>
  <text x="450" y="346" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Node 2 (VM)</text>

  <rect x="346" y="358" width="96" height="68" rx="6" fill="#374151" stroke="#4b5563" stroke-width="1"/>
  <text x="394" y="385" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">Pod</text>
  <text x="394" y="406" fill="#9ca3af" font-size="11" text-anchor="middle">nginx</text>

  <rect x="458" y="358" width="96" height="68" rx="6" fill="#374151" stroke="#4b5563" stroke-width="1"/>
  <text x="506" y="385" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">Pod</text>
  <text x="506" y="406" fill="#9ca3af" font-size="11" text-anchor="middle">nginx</text>

  <rect x="346" y="438" width="208" height="36" rx="6" fill="#374151" stroke="#4b5563" stroke-width="1"/>
  <text x="450" y="461" fill="#9ca3af" font-size="12" text-anchor="middle">kubelet</text>

  <!-- Node 3 -->
  <rect x="610" y="320" width="240" height="196" rx="10" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1"/>
  <text x="730" y="346" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Node 3 (VM)</text>

  <rect x="626" y="358" width="96" height="68" rx="6" fill="#374151" stroke="#4b5563" stroke-width="1"/>
  <text x="674" y="385" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">Pod</text>
  <text x="674" y="406" fill="#9ca3af" font-size="11" text-anchor="middle">nginx</text>

  <rect x="738" y="358" width="96" height="68" rx="6" fill="#374151" stroke="#4b5563" stroke-width="1"/>
  <text x="786" y="385" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">Pod</text>
  <text x="786" y="406" fill="#9ca3af" font-size="11" text-anchor="middle">nginx</text>

  <rect x="626" y="438" width="208" height="36" rx="6" fill="#374151" stroke="#4b5563" stroke-width="1"/>
  <text x="730" y="461" fill="#9ca3af" font-size="12" text-anchor="middle">kubelet</text>

  <!-- Traefik to nodes arrows (dashed) -->
  <line x1="435" y1="200" x2="250" y2="318" stroke="#6ee7b7" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#ag)"/>
  <line x1="435" y1="200" x2="435" y2="318" stroke="#6ee7b7" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#ag)"/>
  <line x1="435" y1="200" x2="660" y2="318" stroke="#6ee7b7" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#ag)"/>

  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
    <marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#6ee7b7" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>
</svg>

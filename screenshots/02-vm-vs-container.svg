<svg width="900" height="440" viewBox="0 0 900 440" xmlns="http://www.w3.org/2000/svg" style="background:#0f1117;font-family:'Segoe UI',system-ui,sans-serif">

  <text x="200" y="36" fill="#fff" font-size="18" font-weight="700" text-anchor="middle">Virtual Machine (VM)</text>
  <text x="660" y="36" fill="#fff" font-size="18" font-weight="700" text-anchor="middle">Container</text>

  <!-- Divider -->
  <line x1="450" y1="10" x2="450" y2="430" stroke="#374151" stroke-width="1" stroke-dasharray="6 4"/>

  <!-- VM annotations -->
  <text x="200" y="62" fill="#9ca3af" font-size="12" text-anchor="middle">Each VM has a full OS</text>
  <text x="200" y="78" fill="#9ca3af" font-size="12" text-anchor="middle">(GBs, slow startup)</text>

  <!-- VM Stack -->
  <rect x="40" y="350" width="320" height="44" rx="6" fill="#374151" stroke="#4b5563" stroke-width="1"/>
  <text x="200" y="377" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Physical hardware</text>

  <rect x="40" y="298" width="320" height="44" rx="6" fill="#374151" stroke="#4b5563" stroke-width="1"/>
  <text x="200" y="325" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Host OS (Windows)</text>

  <rect x="40" y="246" width="320" height="44" rx="6" fill="#7f1d1d" stroke="#ef4444" stroke-width="1"/>
  <text x="200" y="273" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Hypervisor</text>

  <!-- Guest OS boxes -->
  <rect x="40" y="170" width="148" height="68" rx="6" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1"/>
  <text x="114" y="198" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">Guest OS</text>
  <text x="114" y="218" fill="#93c5fd" font-size="11" text-anchor="middle">Ubuntu</text>

  <rect x="212" y="170" width="148" height="68" rx="6" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1"/>
  <text x="286" y="198" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">Guest OS</text>
  <text x="286" y="218" fill="#93c5fd" font-size="11" text-anchor="middle">Ubuntu</text>

  <!-- App boxes -->
  <rect x="40" y="100" width="148" height="60" rx="6" fill="#4c1d95" stroke="#8b5cf6" stroke-width="1"/>
  <text x="114" y="135" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">App A</text>

  <rect x="212" y="100" width="148" height="60" rx="6" fill="#4c1d95" stroke="#8b5cf6" stroke-width="1"/>
  <text x="286" y="135" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">App B</text>

  <!-- Container side annotations -->
  <text x="660" y="62" fill="#9ca3af" font-size="12" text-anchor="middle">Share kernel with host</text>
  <text x="660" y="78" fill="#9ca3af" font-size="12" text-anchor="middle">(MBs, starts in seconds)</text>

  <!-- Container Stack -->
  <rect x="500" y="350" width="320" height="44" rx="6" fill="#374151" stroke="#4b5563" stroke-width="1"/>
  <text x="660" y="377" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Physical hardware</text>

  <rect x="500" y="298" width="320" height="44" rx="6" fill="#374151" stroke="#4b5563" stroke-width="1"/>
  <text x="660" y="325" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Host OS (Windows)</text>

  <rect x="500" y="246" width="320" height="44" rx="6" fill="#0d5c3e" stroke="#10b981" stroke-width="1"/>
  <text x="660" y="273" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Docker Engine</text>

  <!-- Container boxes -->
  <rect x="500" y="170" width="148" height="68" rx="6" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1"/>
  <text x="574" y="198" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">Container A</text>
  <text x="574" y="218" fill="#93c5fd" font-size="11" text-anchor="middle">App + libs</text>

  <rect x="672" y="170" width="148" height="68" rx="6" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1"/>
  <text x="746" y="198" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">Container B</text>
  <text x="746" y="218" fill="#93c5fd" font-size="11" text-anchor="middle">App + libs</text>
</svg>

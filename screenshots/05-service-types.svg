<svg width="900" height="580" viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg" style="background:#0f1117;font-family:'Segoe UI',system-ui,sans-serif">

  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <!-- ClusterIP -->
  <text x="30" y="36" fill="#fff" font-size="16" font-weight="700">1. ClusterIP</text>
  <text x="30" y="56" fill="#9ca3af" font-size="12">Accessible only inside the cluster</text>

  <rect x="30" y="68" width="100" height="40" rx="6" fill="#374151" stroke="#4b5563" stroke-width="1"/>
  <text x="80" y="93" fill="#9ca3af" font-size="12" text-anchor="middle">Internet</text>

  <!-- Blocked cross -->
  <line x1="132" y1="80" x2="158" y2="80" stroke="#9ca3af" stroke-width="1.5"/>
  <line x1="140" y1="68" x2="156" y2="96" stroke="#ef4444" stroke-width="2.5"/>

  <rect x="168" y="68" width="130" height="40" rx="6" fill="#0d5c3e" stroke="#10b981" stroke-width="1"/>
  <text x="233" y="93" fill="#6ee7b7" font-size="12" text-anchor="middle">ClusterIP</text>

  <line x1="298" y1="88" x2="328" y2="88" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="330" y="68" width="80" height="40" rx="6" fill="#2d2b7a" stroke="#5b58d4" stroke-width="1"/>
  <text x="370" y="93" fill="#a5b4fc" font-size="12" text-anchor="middle">Pod A</text>

  <rect x="420" y="68" width="80" height="40" rx="6" fill="#2d2b7a" stroke="#5b58d4" stroke-width="1"/>
  <text x="460" y="93" fill="#a5b4fc" font-size="12" text-anchor="middle">Pod B</text>

  <rect x="322" y="60" width="186" height="56" rx="6" fill="none" stroke="#374151" stroke-width="1" stroke-dasharray="4 3"/>

  <text x="560" y="82" fill="#6b7280" font-size="11">inside cluster only</text>
  <text x="30" y="130" fill="#4b5563" font-size="11">Example: database — does not need to be public, only accessible to the backend Pod</text>

  <!-- Divider -->
  <line x1="30" y1="148" x2="870" y2="148" stroke="#1f2937" stroke-width="1"/>

  <!-- NodePort -->
  <text x="30" y="174" fill="#fff" font-size="16" font-weight="700">2. NodePort</text>
  <text x="30" y="194" fill="#9ca3af" font-size="12">Accessible externally, but on a specific port on each VM</text>

  <rect x="30" y="206" width="100" height="40" rx="6" fill="#374151" stroke="#4b5563" stroke-width="1"/>
  <text x="80" y="231" fill="#9ca3af" font-size="12" text-anchor="middle">Internet</text>

  <line x1="130" y1="226" x2="158" y2="226" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="160" y="198" width="150" height="56" rx="6" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1"/>
  <text x="235" y="223" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">Node VM</text>
  <text x="235" y="242" fill="#93c5fd" font-size="11" text-anchor="middle">port 30080</text>

  <line x1="310" y1="226" x2="338" y2="226" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="340" y="206" width="120" height="40" rx="6" fill="#0d5c3e" stroke="#10b981" stroke-width="1"/>
  <text x="400" y="231" fill="#6ee7b7" font-size="12" text-anchor="middle">NodePort</text>

  <line x1="460" y1="226" x2="488" y2="226" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="490" y="206" width="80" height="40" rx="6" fill="#2d2b7a" stroke="#5b58d4" stroke-width="1"/>
  <text x="530" y="231" fill="#a5b4fc" font-size="12" text-anchor="middle">Pod A</text>

  <rect x="580" y="206" width="80" height="40" rx="6" fill="#2d2b7a" stroke="#5b58d4" stroke-width="1"/>
  <text x="620" y="231" fill="#a5b4fc" font-size="12" text-anchor="middle">Pod B</text>

  <text x="30" y="270" fill="#4b5563" font-size="11">Example: testing — you need to know the node IP and port (ugly for production)</text>

  <!-- Divider -->
  <line x1="30" y1="288" x2="870" y2="288" stroke="#1f2937" stroke-width="1"/>

  <!-- LoadBalancer -->
  <text x="30" y="314" fill="#fff" font-size="16" font-weight="700">3. LoadBalancer</text>
  <text x="30" y="334" fill="#9ca3af" font-size="12">Public IP — cloud automatically creates a real load balancer</text>

  <rect x="30" y="346" width="100" height="40" rx="6" fill="#374151" stroke="#4b5563" stroke-width="1"/>
  <text x="80" y="371" fill="#9ca3af" font-size="12" text-anchor="middle">Internet</text>

  <line x1="130" y1="366" x2="158" y2="366" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="160" y="338" width="150" height="56" rx="6" fill="#6b3a08" stroke="#d97706" stroke-width="1"/>
  <text x="235" y="363" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">Azure LB</text>
  <text x="235" y="382" fill="#fcd34d" font-size="11" text-anchor="middle">public IP</text>

  <line x1="310" y1="366" x2="338" y2="366" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="340" y="346" width="130" height="40" rx="6" fill="#0d5c3e" stroke="#10b981" stroke-width="1"/>
  <text x="405" y="371" fill="#6ee7b7" font-size="12" text-anchor="middle">LoadBalancer</text>

  <line x1="470" y1="366" x2="498" y2="366" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="500" y="346" width="74" height="40" rx="6" fill="#2d2b7a" stroke="#5b58d4" stroke-width="1"/>
  <text x="537" y="371" fill="#a5b4fc" font-size="12" text-anchor="middle">Pod A</text>

  <rect x="584" y="346" width="74" height="40" rx="6" fill="#2d2b7a" stroke="#5b58d4" stroke-width="1"/>
  <text x="621" y="371" fill="#a5b4fc" font-size="12" text-anchor="middle">Pod B</text>

  <rect x="668" y="346" width="74" height="40" rx="6" fill="#2d2b7a" stroke="#5b58d4" stroke-width="1"/>
  <text x="705" y="371" fill="#a5b4fc" font-size="12" text-anchor="middle">Pod C</text>

  <text x="30" y="410" fill="#4b5563" font-size="11">Example: production — users access on standard port 80, everything is hidden behind the LB</text>

  <!-- Summary table -->
  <rect x="30" y="428" width="840" height="136" rx="10" fill="#111827" stroke="#1f2937" stroke-width="1"/>
  <text x="50" y="454" fill="#fff" font-size="14" font-weight="700">Summary</text>

  <line x1="30" y1="462" x2="870" y2="462" stroke="#1f2937" stroke-width="1"/>

  <text x="60" y="484" fill="#6b7280" font-size="12">Type</text>
  <text x="260" y="484" fill="#6b7280" font-size="12">Accessibility</text>
  <text x="520" y="484" fill="#6b7280" font-size="12">When to use</text>

  <line x1="30" y1="492" x2="870" y2="492" stroke="#1f2937" stroke-width="0.5"/>

  <text x="60" y="514" fill="#fff" font-size="13">ClusterIP</text>
  <text x="260" y="514" fill="#9ca3af" font-size="12">inside cluster only</text>
  <text x="520" y="514" fill="#9ca3af" font-size="12">databases, internal services</text>

  <text x="60" y="536" fill="#fff" font-size="13">NodePort</text>
  <text x="260" y="536" fill="#9ca3af" font-size="12">external, ugly high port</text>
  <text x="520" y="536" fill="#9ca3af" font-size="12">testing, dev environments</text>

  <text x="60" y="558" fill="#fff" font-size="13">LoadBalancer</text>
  <text x="260" y="558" fill="#9ca3af" font-size="12">public IP, port 80</text>
  <text x="520" y="558" fill="#9ca3af" font-size="12">production</text>
</svg>
